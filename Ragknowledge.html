<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RAG Simulator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:#0f172a;
    color:white;
    overflow-x:hidden;
}

body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at top left,#2563eb33,transparent 30%),
        radial-gradient(circle at bottom right,#9333ea33,transparent 30%);
    z-index:-1;
}

.container{
    width:95%;
    max-width:1400px;
    margin:auto;
    padding:30px 0 60px;
}

.header{
    text-align:center;
    margin-bottom:40px;
}

.header h1{
    font-size:52px;
    font-weight:700;
    background:linear-gradient(90deg,#60a5fa,#c084fc);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.header p{
    color:#cbd5e1;
    margin-top:10px;
    font-size:18px;
}

.grid{
    display:grid;
    grid-template-columns: 1fr 420px;
    gap:24px;
}

.card{
    background:rgba(15,23,42,0.7);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:24px;
    padding:24px;
    backdrop-filter: blur(12px);
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.section-title{
    font-size:22px;
    margin-bottom:18px;
    color:#93c5fd;
}

.documents{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(240px,1fr));
    gap:16px;
    margin-bottom:24px;
}

.doc{
    background:#1e293b;
    border:1px solid transparent;
    padding:18px;
    border-radius:18px;
    transition:0.3s;
    cursor:pointer;
}

.doc:hover{
    transform:translateY(-3px);
    border-color:#60a5fa;
}

.doc.active{
    border-color:#22c55e;
    background:#14532d;
}

.doc h3{
    font-size:17px;
    margin-bottom:10px;
}

.doc p{
    color:#cbd5e1;
    font-size:14px;
    line-height:1.6;
}

textarea{
    width:100%;
    min-height:110px;
    background:#0f172a;
    border:1px solid #334155;
    border-radius:18px;
    color:white;
    padding:18px;
    resize:none;
    font-size:15px;
    margin-bottom:18px;
}

textarea:focus{
    outline:none;
    border-color:#60a5fa;
}

button{
    background:linear-gradient(90deg,#2563eb,#7c3aed);
    border:none;
    padding:14px 24px;
    border-radius:14px;
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
    width:100%;
    font-size:16px;
}

button:hover{
    transform:scale(1.02);
}

.pipeline{
    display:flex;
    flex-direction:column;
    gap:18px;
}

.step{
    background:#111827;
    border-radius:18px;
    padding:18px;
    border-left:5px solid #334155;
    opacity:0.5;
    transform:translateX(20px);
    transition:0.5s;
}

.step.active{
    opacity:1;
    transform:translateX(0);
    border-left-color:#60a5fa;
    background:#1e293b;
}

.step h4{
    margin-bottom:8px;
    color:#93c5fd;
}

.step p{
    font-size:14px;
    color:#cbd5e1;
    line-height:1.6;
}
